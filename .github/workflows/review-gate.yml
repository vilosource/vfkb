name: review-gate
on:
  pull_request:
  push:
    branches: [main]
jobs:
  review-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # On `pull_request`, checkout defaults to GitHub's synthetic MERGE ref.
          # Its sha is server-generated, and the commit the author actually
          # reviewed sits on the second parent — so a correctly filed
          # reviews/<head-sha>.json would never be found, and the gate would
          # red-light every honest PR. Check out the real head commit.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # The gate diffs against the merge-base with the base branch, and walks
          # commits to decide which shas a record may be filed against. A shallow
          # clone has neither.
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      # A Brake nobody has watched fail is a Brake nobody knows is connected.
      - name: The gate is connected — negative checks go red
        run: node scripts/review-gate.selftest.mjs

      # An ADR records a DECISION; build state is mutable and belongs in the
      # tracker. docs/adr/README.md already said so and three ADRs did it anyway
      # (ADR-0064 was false within a day) — hence a Brake, not a sentence.
      - name: The ADR lint is connected — negative checks go red
        run: node scripts/adr-lint.selftest.mjs

      - name: ADRs do not assert their own build state
        run: node scripts/adr-lint.mjs

      # Same discipline for the durable-claim Brake (brain gotcha a1aea707436c):
      # it must speak on artifact writes, stay silent on ordinary work, and fail
      # open on garbage. A hook that always speaks gets read past, so the silence
      # cases are asserted as hard as the speaking ones.
      - name: The durable-claim Brake is connected — negative checks go red
        run: node scripts/hook-durable-claim-check.selftest.mjs

      - name: An implementation change carries a review record (ADR-0052)
        run: |
          BASE="origin/${{ github.base_ref || 'main' }}"
          git fetch origin "${{ github.base_ref || 'main' }}" --quiet || true
          node scripts/review-gate.mjs --base "$BASE"
